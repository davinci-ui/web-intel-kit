# SearXNG Settings
# See: https://docs.searxng.org/admin/settings/index.html

use_default_settings: true

server:
  secret_key: "7b8b345d5a8d7d07f206be0d6130c0e0c4b350b9ba55bb4c681fc4109418d4d8"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false  # Disable rate limiting for local/agent use

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "auto"
  formats:
    - html
    - json  # Required for API access

ui:
  static_use_hash: true
  default_theme: simple

engines:
  # Ensure JSON format is available
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
